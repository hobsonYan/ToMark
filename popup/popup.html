<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToMark</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 360px;
      min-height: 400px;
      background: #f5f5f5;
    }
    
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 16px;
      text-align: center;
    }
    
    .header h1 {
      font-size: 20px;
      margin-bottom: 4px;
    }
    
    .header p {
      font-size: 12px;
      opacity: 0.9;
    }
    
    .stats {
      display: flex;
      justify-content: space-around;
      padding: 12px;
      background: white;
      border-bottom: 1px solid #eee;
    }
    
    .stat {
      text-align: center;
    }
    
    .stat-value {
      font-size: 24px;
      font-weight: bold;
      color: #667eea;
    }
    
    .stat-label {
      font-size: 11px;
      color: #666;
    }
    
    .section-title {
      padding: 12px 16px 8px;
      font-size: 13px;
      font-weight: 600;
      color: #333;
    }
    
    .highlights-list {
      max-height: 300px;
      overflow-y: auto;
    }
    
    .highlight-item {
      background: white;
      margin: 0 12px 8px;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .highlight-item:hover {
      transform: translateX(4px);
    }
    
    .highlight-text {
      font-size: 13px;
      color: #333;
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .highlight-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: #999;
    }
    
    .highlight-color {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
    }
    
    .highlight-note {
      background: #fff9e6;
      padding: 8px;
      border-radius: 4px;
      margin-top: 8px;
      font-size: 12px;
      color: #666;
    }
    
    .actions {
      padding: 12px 16px;
      display: flex;
      gap: 8px;
    }
    
    .btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    
    .btn:hover {
      opacity: 0.9;
    }
    
    .btn-primary {
      background: #667eea;
      color: white;
    }
    
    .btn-secondary {
      background: #e0e0e0;
      color: #333;
    }
    
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }
    
    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 12px;
    }
    
    .empty-state p {
      font-size: 13px;
    }
    
    .filter-tabs {
      display: flex;
      padding: 8px 12px;
      gap: 8px;
      background: white;
      border-bottom: 1px solid #eee;
    }
    
    .filter-tab {
      padding: 6px 12px;
      border-radius: 16px;
      font-size: 12px;
      background: #f0f0f0;
      border: none;
      cursor: pointer;
    }
    
    .filter-tab.active {
      background: #667eea;
      color: white;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📌 ToMark</h1>
    <p>轻量网页批注工具</p>
  </div>
  
  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="totalCount">0</div>
      <div class="stat-label">批注总数</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="pageCount">0</div>
      <div class="stat-label">本页批注</div>
    </div>
  </div>
  
  <div class="filter-tabs">
    <button class="filter-tab active" data-filter="all">全部</button>
    <button class="filter-tab" data-filter="current">本页</button>
  </div>
  
  <div class="highlights-list" id="highlightsList">
    <div class="empty-state">
      <div class="icon">📝</div>
      <p>还没有批注</p>
      <p style="font-size:11px;margin-top:4px;">选中文字后点击高亮按钮添加批注</p>
    </div>
  </div>
  
  <div class="actions">
    <button class="btn btn-secondary" id="exportBtn">📤 导出</button>
    <button class="btn btn-secondary" id="clearBtn">🗑️ 清空</button>
    <button class="btn btn-primary" id="newBtn">✨ 新批注</button>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
